<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yan Xiao</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      height: 100vh;
      background: url('image.png') no-repeat center center;
      background-size: cover;
      position: relative;
    }

    /* 暗层 */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    /* 顶部导航 */
    .nav {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      z-index: 1;
    }

    .nav a {
      margin: 0 20px;
      text-decoration: none;
      color: white;
      font-size: 1rem;
      letter-spacing: 1px;
      opacity: 0.7;
      transition: 0.3s;
    }

    .nav a:hover {
      opacity: 1;
    }

    /* 左上角名字（可选但我建议加） */
    .logo {
      position: absolute;
      top: 30px;
      left: 30px;
      font-size: 0.9rem;
      opacity: 0.6;
      letter-spacing: 1px;
      z-index: 1;
    }

  </style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>

  <div class="logo">Yan Xiao</div>

  <div class="nav">
    <a href="#">Me, Myself and I</a>
    <a href="#">I write</a>
    <a href="#">I think</a>
    <a href="#">I connect</a>
  </div>

</div>

</body>
</html>
