<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yan Xiao</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    .header {
      width: 100%;
      background: black;
      display: flex;
      align-items: flex-start;
      padding: 22px 32px 18px 32px;
      box-sizing: border-box;
      gap: 24px;
    }

    .site-name {
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      opacity: 0.95;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tagline {
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.1px;
      line-height: 1.4;
      white-space: nowrap;
      margin-top: 5px;
    }

    .nav {
      display: flex;
      gap: 28px;
      margin-left: 60px;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-size: 0.95rem;
      opacity: 0.78;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .nav a:hover {
      opacity: 1;
    }

    .nav-short {
      display: none;
    }

    .hero {
      height: calc(100vh - 78px);
      background: url('image.png') no-repeat center top;
      background-size: cover;
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        padding: 18px 20px 14px 20px;
      }

      .nav {
        margin-left: 0;
        flex-wrap: wrap;
        gap: 11px 18px;
      }

      .nav a {
        font-size: 0.875rem;
        white-space: normal;
      }

      .nav-short {
        display: inline;
      }

      .nav-full {
        display: none;
      }

      .tagline {
        white-space: normal;
      }

      .hero {
        height: 65vh;
        opacity: 0.45;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <div class="site-name">Yan Xiao</div>
      <div class="tagline">I study how AI systems shape what we can see, know, and recognize.</div>
    </div>

    <div class="nav">
      <a href="me.html"><span class="nav-full">Me, Myself and I</span><span class="nav-short">Me</span></a>
      <a href="write.html">I write</a>
      <a href="think.html">I think</a>
      <a href="teach.html">I teach</a>
      <a href="connect.html">I connect</a>
    </div>
  </div>

  <div class="hero"></div>

</body>
</html>
