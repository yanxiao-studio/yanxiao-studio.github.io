<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yan Xiao</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dfe4ea;
      font-family: Helvetica, Arial, sans-serif;
      color: white;
    }

    .frame {
      width: 92vw;
      height: 92vh;
      margin: 4vh auto;
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .hero {
      position: absolute;
      inset: 0;
      background: url('image.png') no-repeat center center;
      background-size: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
    }

    .site-name {
      position: absolute;
      top: 26px;
      left: 34px;
      z-index: 2;
      font-size: 1.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.95;
    }

    .nav {
      position: absolute;
      top: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      gap: 56px;
      white-space: nowrap;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      opacity: 0.9;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav a:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .site-name {
        font-size: 1.2rem;
        top: 20px;
        left: 20px;
      }

      .nav {
        top: 70px;
        gap: 22px;
        flex-wrap: wrap;
        width: calc(100% - 40px);
        justify-content: center;
      }

      .nav a {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="hero"></div>
    <div class="overlay"></div>

    <div class="site-name">Yan Xiao</div>

    <nav class="nav">
      <a href="#">Me, Myself and I</a>
      <a href="#">I write</a>
      <a href="#">I think</a>
      <a href="#">I connect</a>
    </nav>
  </div>
</body>
</html>
