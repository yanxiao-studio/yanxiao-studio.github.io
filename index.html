<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Yan Xiao</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    /* 顶部 header */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      background: black;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 10;
    }

    .site-name {
      font-size: 1.2rem;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .nav {
      display: flex;
      gap: 30px;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-size: 1rem;
      opacity: 0.7;
      transition: 0.3s;
    }

    .nav a:hover {
      opacity: 1;
    }

    /* 图片区域 */
    .hero {
      margin-top: 70px; /* 给header让位 */
      height: calc(100vh - 70px);
      background: url('image.png') no-repeat center center;
      background-size: cover;
    }

  </style>
</head>

<body>

<div class="header">
  <div class="site-name">Yan Xiao</div>

  <div class="nav">
    <a href="#">Me, Myself and I</a>
    <a href="#">I write</a>
    <a href="#">I think</a>
    <a href="#">I teach</a>
    <a href="#">I connect</a>
  </div>
</div>

<div class="hero"></div>

</body>
</html>
