<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yan Xiao</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    .header {
      width: 100%;
      background: black;
      display: flex;
      align-items: flex-start;
      padding: 22px 32px 18px 32px;
      box-sizing: border-box;
      gap: 24px;
    }

    .site-name {
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      opacity: 0.95;
      white-space: nowrap;
      flex-shrink: 0;
    }

 .nav {
  display: flex;
  gap: 28px;
  margin-left: 60px;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-size: 0.95rem;
      opacity: 0.78;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    .nav a:hover {
      opacity: 1;
    }

    .hero {
      height: calc(100vh - 78px);
      background: url('image.png') no-repeat center top;
      background-size: cover;
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
      }

      .hero {
        height: calc(100vh - 120px);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="site-name">Yan Xiao</div>

    <div class="nav">
      <a href="#">Me, Myself and I</a>
      <a href="#">I write</a>
      <a href="#">I think</a>
      <a href="#">I teach</a>
      <a href="#">I connect</a>
    </div>
  </div>

  <div class="hero"></div>

</body>
</html>
